# Render Blueprint — defines the Nightride agent backend service.
# After signing up at https://render.com (free, no card needed):
#   1. Connect your GitHub account
#   2. New → Blueprint → pick this repo (inRiseDigital/nightrider)
#   3. Render auto-detects this file and deploys
#   4. Set the env vars below in the dashboard (don't commit them)
#
# Render free tier: 750 hours/month, spins down after 15 min idle
# (first request after idle takes ~30s to wake up — fine for testing).

services:
  - type: web
    name: nightride-agent
    runtime: docker
    rootDir: Nightride/Agent
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      # Set these via Render dashboard → Environment → Add Secret File / Env Var.
      # Don't commit the actual values.
      - key: ANTHROPIC_API_KEY
        sync: false   # marks as secret — set manually
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /app/firebase_service_account.json

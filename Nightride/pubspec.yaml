name: nightride
description: "A new Flutter project."
publish_to: "none"

version: 2.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  gap: ^3.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  mapbox_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.0
  pinput: ^6.0.1
  carousel_slider: ^5.1.1
  flutter_wall_layout: ^2.1.2
  package_info_plus: ^8.0.2
  http: ^1.1.0
  flutter_markdown: ^0.7.3+1
  uuid: ^4.2.2
  photo_view: ^0.15.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.4.4
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
